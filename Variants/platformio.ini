[BCRHammer]
extends = esp32_base
board = esp32doit-devkit-v1

build_flags =
  ${esp32_base.build_flags}
  -I variants/bcrhammer
  -D BCRHAMMER=1

  ; LED / battery
  -D P_LORA_TX_LED=2
  -D PIN_VBAT_READ=35

  ; LoRa (required by variants/*/target.cpp)
  -D P_LORA_DIO_1=33
  -D P_LORA_NSS=18
  -D P_LORA_RESET=23
  -D P_LORA_BUSY=32

  ; SPI (enables SPIClass path in target.cpp)
  -D P_LORA_SCLK=5
  -D P_LORA_MOSI=27
  -D P_LORA_MISO=19

  ; RF switch pins (used by SX126x wrappers)
  -D SX126X_TXEN=13
  -D SX126X_RXEN=14

  ; OLED I2C
  -D PIN_BOARD_SDA=21
  -D PIN_BOARD_SCL=22

  ; TCXO + current limit
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140

  ; GPS UART pins (harmless if unused)
  -D GPS_RX_PIN=15
  -D GPS_TX_PIN=12
  -D MAX_GROUP_CHANNELS=8
build_src_filter =
  ${esp32_base.build_src_filter}
  +<../variants/bcrhammer>

lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13


; ------------------------------------------------
; PROOF ENV (should ALWAYS show up if file is loaded)
; ------------------------------------------------
[env:BCRHammer_PROOF]
extends = BCRHammer
build_flags =
  ${BCRHammer.build_flags}
  -D BCRHAMMER_PROOF=1


; -------------------------
; Repeater (matches Generic_E22 pattern)
; -------------------------
[env:BCRHammer_sx1262_repeater]
extends = BCRHammer
build_src_filter =
  ${BCRHammer.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${BCRHammer.build_flags}
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D ADVERT_NAME='"BCRHammer Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
lib_deps =
  ${BCRHammer.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:BCRHammer_sx1262_companion_radio_usb]
extends = BCRHammer
build_flags =
  ${BCRHammer.build_flags}
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22

  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8

build_src_filter =
  ${BCRHammer.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>

lib_deps =
  ${BCRHammer.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:BCRHammer_sx1262_companion_radio_ble]
extends = BCRHammer
build_flags =
  ${BCRHammer.build_flags}
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22

  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8

  -D BLE_PIN_CODE=123456
  ; -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256

build_src_filter =
  ${BCRHammer.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>

lib_deps =
  ${BCRHammer.lib_deps}
  densaugeo/base64 @ ~1.4.0
